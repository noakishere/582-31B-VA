{% extends "base.html" %} {% block title %} Account | Foundry {% endblock %} {%
block content %}
<h1>Your account</h1>

<dl>
  <dt>Username</dt>
  <dd>{{ current_user.username }}</dd>

  <dt>Email</dt>
  <dd>{{ current_user.email }}</dd>
</dl>

<section>
  <h2>Change email</h2>

  <form
    action="{{ url_for(
                'change_email'
            ) }}"
    method="post"
  >
    <label for="email"> New email </label>

    <input
      id="email"
      name="email"
      type="email"
      value="{{ current_user.email }}"
      required
    />

    <button type="submit">Update email</button>
  </form>
</section>

<section>
  <h2>Change password</h2>

  <form
    action="{{ url_for(
                'change_password'
            ) }}"
    method="post"
  >
    <div>
      <label for="current-password"> Current password </label>

      <input
        id="current-password"
        name="current_password"
        type="password"
        required
      />
    </div>

    <div>
      <label for="new-password"> New password </label>

      <input
        id="new-password"
        name="new_password"
        type="password"
        minlength="8"
        maxlength="20"
        required
      />
    </div>

    <button type="submit">Update password</button>
  </form>
</section>
{% endblock %}
