{% extends "base.html" %} {% block title %} Login | Foundry {% endblock %} {%
block content %}
<h1>Member login</h1>

<form method="post">
  <div>
    <label for="username"> Username </label>

    <input
      id="username"
      name="username"
      type="text"
      value="{{ username or '' }}"
      required
    />
  </div>

  <div>
    <label for="password"> Password </label>

    <input id="password" name="password" type="password" required />
  </div>

  <button type="submit">Log in</button>
</form>
{% endblock %}
