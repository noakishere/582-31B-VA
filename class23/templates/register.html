{% extends "base.html" %} {% block title %} Register | Foundry {% endblock %} {%
block content %}
<h1>Create an account</h1>

<form method="post">
  <div>
    <label for="username"> Username </label>

    <input
      id="username"
      name="username"
      type="text"
      maxlength="50"
      value="{{ username or '' }}"
      required
    />
  </div>

  <div>
    <label for="email"> Email </label>

    <input
      id="email"
      name="email"
      type="email"
      value="{{ email or '' }}"
      required
    />
  </div>

  <div>
    <label for="password"> Password </label>

    <input
      id="password"
      name="password"
      type="password"
      minlength="8"
      maxlength="20"
      required
    />
  </div>

  <button type="submit">Create account</button>
</form>
{% endblock %}
