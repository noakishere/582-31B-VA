<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    {% if movies %}
    <ul>
      {% for movie in movies %}
      <li>{{ movie.title }}</li>
      {% endfor %}
    </ul>
    {% else %}
    <p>No movies in the database yet.</p>
    {% endif %}
  </body>
</html>
